services:
  mongo:
    image: mongodb/mongodb-atlas-local:8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  mnema:
    build: ./
    restart: unless-stopped
    ports:
      - "${MNEMA_PORT:-5757}:5757"
    volumes:
      - ./config:/app/config
      - ~/.mnema:/app/.mnema
    environment:
      CONFIG_PATH: /app/config/bootstrap.toml
      MNEMA_HOME: /app/.mnema
    depends_on:
      - mongo
    networks:
      - internal
      - external
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  internal:
    internal: true
  external:

volumes:
  mongo_data:
